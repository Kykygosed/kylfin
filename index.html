<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulateur Conduite Manuelle</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HUD overlay -->
  <div id="hud">
    <div id="hud-left">
      <div class="hud-box" id="gear-display">
        <span class="hud-label">VITESSE</span>
        <span class="hud-value" id="gear-val">N</span>
      </div>
      <div class="hud-box" id="speed-display">
        <span class="hud-label">KM/H</span>
        <span class="hud-value" id="speed-val">0</span>
      </div>
    </div>
    <div id="hud-center">
      <canvas id="rpm-gauge" width="160" height="160"></canvas>
      <div id="engine-status">MOTEUR ÉTEINT</div>
    </div>
    <div id="hud-right">
      <div class="hud-box">
        <span class="hud-label">FREIN MAIN</span>
        <span class="hud-value" id="handbrake-val">ON</span>
      </div>
      <div class="hud-box">
        <span class="hud-label">CALAGE</span>
        <span id="stall-indicator" class="indicator off">●</span>
      </div>
    </div>
  </div>

  <!-- Instruction panel -->
  <div id="instruction-panel">
    <div id="instruction-text">Appuyez sur <kbd>E</kbd> pour démarrer</div>
  </div>

  <!-- Canvas world -->
  <canvas id="world"></canvas>

  <!-- Steering wheel -->
  <div id="steering-wrapper">
    <div id="steering-wheel" id="steering">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="56" fill="none" stroke="#c8a96e" stroke-width="10"/>
        <circle cx="60" cy="60" r="18" fill="#1a1a1a" stroke="#c8a96e" stroke-width="3"/>
        <line x1="60" y1="4" x2="60" y2="42" stroke="#c8a96e" stroke-width="5" stroke-linecap="round"/>
        <line x1="60" y1="78" x2="60" y2="116" stroke="#c8a96e" stroke-width="5" stroke-linecap="round"/>
        <line x1="4" y1="60" x2="42" y2="60" stroke="#c8a96e" stroke-width="5" stroke-linecap="round"/>
        <line x1="78" y1="60" x2="116" y2="60" stroke="#c8a96e" stroke-width="5" stroke-linecap="round"/>
        <circle cx="60" cy="60" r="5" fill="#c8a96e"/>
        <!-- indicator dot top -->
        <circle cx="60" cy="10" r="4" fill="#e74c3c"/>
      </svg>
    </div>
  </div>

  <!-- Pedals panel -->
  <div id="pedals-panel">
    <!-- Clutch -->
    <div class="pedal-group" id="pg-clutch">
      <div class="pedal-label">EMBRAYA<br>GE</div>
      <div class="pedal-track" id="clutch-track">
        <div class="pedal-fill" id="clutch-fill"></div>
        <div class="pedal-thumb" id="clutch-thumb" data-pedal="clutch"></div>
      </div>
      <div class="pedal-key"><kbd>C</kbd></div>
      <div class="pedal-pct" id="clutch-pct">0%</div>
    </div>
    <!-- Brake -->
    <div class="pedal-group" id="pg-brake">
      <div class="pedal-label">FREIN</div>
      <div class="pedal-track" id="brake-track">
        <div class="pedal-fill" id="brake-fill"></div>
        <div class="pedal-thumb" id="brake-thumb" data-pedal="brake"></div>
      </div>
      <div class="pedal-key"><kbd>B</kbd></div>
      <div class="pedal-pct" id="brake-pct">0%</div>
    </div>
    <!-- Gas -->
    <div class="pedal-group" id="pg-gas">
      <div class="pedal-label">ACCÉLÉ<br>RATEUR</div>
      <div class="pedal-track" id="gas-track">
        <div class="pedal-fill" id="gas-fill"></div>
        <div class="pedal-thumb" id="gas-thumb" data-pedal="gas"></div>
      </div>
      <div class="pedal-key"><kbd>G</kbd></div>
      <div class="pedal-pct" id="gas-pct">0%</div>
    </div>
  </div>

  <!-- Gear shifter -->
  <div id="shifter-panel">
    <div id="shifter-title">VITESSES</div>
    <div id="shifter-grid">
      <div class="gear-btn" data-gear="R">R</div>
      <div class="gear-btn" data-gear="N" id="gear-N">N</div>
      <div class="gear-btn" data-gear="1">1</div>
      <div class="gear-btn" data-gear="2">2</div>
      <div class="gear-btn" data-gear="3">3</div>
      <div class="gear-btn" data-gear="4">4</div>
      <div class="gear-btn" data-gear="5">5</div>
    </div>
    <div id="shifter-keys">
      <small>↑↓ ou Z/X pour changer</small><br>
      <small><kbd>H</kbd> Frein à main</small>
    </div>
  </div>

  <!-- Keyboard shortcuts legend -->
  <div id="shortcuts">
    <b>Raccourcis</b><br>
    <kbd>E</kbd> Démarrage &nbsp;
    <kbd>C</kbd> Embrayage &nbsp;
    <kbd>B</kbd> Frein &nbsp;
    <kbd>G</kbd> Gaz &nbsp;
    <kbd>H</kbd> Frein main &nbsp;
    <kbd>↑↓</kbd> / <kbd>Z</kbd><kbd>X</kbd> Vitesses &nbsp;
    <kbd>←→</kbd> Volant
  </div>

  <script src="engine.js"></script>
  <script src="world.js"></script>
  <script src="controls.js"></script>
  <script src="main.js"></script>
</body>
</html>
